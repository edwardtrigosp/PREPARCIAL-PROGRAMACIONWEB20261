<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
        <nav class="menu">
            <ul>
                <li><a href="../index.html">inicio</a></li>
                <li><a href="servicios.html">servicios</a></li>
                <li><a href="#">contacto</a></li>
            </ul>
        </nav>
        
    </header>
    <main>
    
        <form action="#" method="post" class="formulario-registro">
            <!-- CC tipo number -->
            <div>
                <label for="cc">CC:</label>
                <input type="number" id="cc" name="cc" required>
            </div>
            <!-- Nombres -->
            <div>
                <label for="nombres">Nombres:</label>
                <input type="text" id="nombres" name="nombres" required>
            </div>
            <!-- Apellidos -->
            <div>
                <label for="apellidos">Apellidos:</label>
                <input type="text" id="apellidos" name="apellidos" required>
            </div>
            <!-- Email -->
            <div>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>
            <!-- Usuario -->
            <div>
                <label for="usuario">Usuario:</label>
                <input type="text" id="usuario" name="usuario" required>
            </div>
            <!-- Password -->
            <div>
                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" required>
            </div>
            <!-- Botón enviar -->
            <div>
                <button type="submit">Enviar</button>
            </div>
        </form>
    </main>
    <footer>
        <div class="footer">
            <p>Pagina creada por : EDWARD TRIGOS y FRANCISCO RINCON </p>
            <div class="iconos">
                <a href="https://www.facebook.com/ClaroCol/" target="_blank" title="Facebook">
                    <img src="../img/facebook.png" alt="Facebook">
                </a>
                <a href="https://www.instagram.com/clarocolombia/" target="_blank" title="Instagram">
                    <img src="../img/instagram.png" alt="Instagram">
                </a>
                <a href="https://api.whatsapp.com/send/?phone=573205000000&text=Quiero+comprar+con+un+asesor&app_absent=0" target="_blank" title="X (Twitter)">
                    <img src="../img/whatsaapp.png" alt="X">
                </a>
            </div>
        </div>
    </footer>

</body>
</html>
